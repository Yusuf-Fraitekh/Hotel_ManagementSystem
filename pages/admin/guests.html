<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickStay Admin — Guests</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/admin/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo"><i class="fa-solid fa-bolt-lightning"></i></div>
      <div class="brand-text">QuickStay</div>
    </div>
    <nav class="nav-links">
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
      <a class="nav-item" href="rooms.html"><i class="fa-solid fa-bed"></i> Rooms</a>
      <a class="nav-item" href="bookings.html"><i class="fa-solid fa-calendar-check"></i> Bookings</a>
      <a class="nav-item active" href="guests.html"><i class="fa-solid fa-users"></i> Guests</a>
      <a class="nav-item" href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-item" href="../login-signin-page/authintcate.html" onclick="window.QS_STORAGE && window.QS_STORAGE.remove(window.QS_STORAGE.KEYS.user)">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Guest Management</div>
        <div class="topbar-breadcrumb">All registered guests — derived from live booking records</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="dashboard-stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:28px;">
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;"><i class="fa-solid fa-users"></i></div>
        <div class="stat-info"><div class="stat-val" id="g-total">—</div><div class="stat-label">Unique Guests</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;"><i class="fa-solid fa-door-open"></i></div>
        <div class="stat-info"><div class="stat-val" id="g-active">—</div><div class="stat-label">Currently Staying</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;"><i class="fa-solid fa-coins"></i></div>
        <div class="stat-info"><div class="stat-val" id="g-revenue">—</div><div class="stat-label">Total Revenue</div></div>
      </div>
    </div>

    <!-- Search -->
    <div class="toolbar" style="margin-bottom:20px;">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Search by name or email..."/>
      </div>
    </div>

    <!-- Guests Table -->
    <div class="table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Guest</th>
            <th>Email</th>
            <th>Total Bookings</th>
            <th>Total Spent</th>
            <th>Last Booking</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="guests-tbody">
          <tr><td colspan="6" style="text-align:center;padding:50px;color:var(--text-muted);font-weight:700;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../../js/shared/storage.js"></script>
<script src="../../js/shared/api.js"></script>
<script src="../../js/shared/utils/dates.js"></script>
<script src="../../js/admin/admin_guests.js"></script>
</body>
</html>
