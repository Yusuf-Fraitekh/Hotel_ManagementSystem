<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickStay Hotel | Rooms</title>
  <meta name="description" content="Browse and filter all available hotel rooms at QuickStay. Filter by type, view, floor, guests, price and more.">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/user/site.css" />
  <link rel="stylesheet" href="../../css/user/user_rooms.css" />
</head>
<body>

<header class="header" id="siteHeader">
  <div class="container">
    <nav class="nav" aria-label="Main Navigation">
      <a class="brand" href="index.html">
        <span class="brand__logo"><i class="fa-solid fa-house-chimney"></i></span>
        QuickStay
      </a>

      <div class="nav__menu">
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="bookings.html" id="navBookings" style="display:none;">My Bookings</a>
      </div>

      <div class="nav__actions" id="authArea">
        </div>
    </nav>
  </div>
</header>

<main>
  <section class="page-hero">
    <div class="container">
      <h1 class="page-title">Available Rooms</h1>
      <div class="booking-summary" id="bookingSummary"></div>
    </div>
  </section>

  <section class="page-section">
    <div class="container">
      <div class="layout">

        <!-- ── Sidebar Filters ─────────────────────────────── -->
        <aside class="sidebar">
          <form class="sidebar-card" id="filtersForm">
            <h3>Filter Results</h3>

            <!-- 1. Flow & Dates -->
            <div class="filter-group">
              <span class="filter-label">Check-in</span>
              <div class="filter-control">
                <i class="fa-regular fa-calendar-check"></i>
                <input type="date" id="filterCheckin" name="checkin">
              </div>
            </div>
            <div class="filter-group">
              <span class="filter-label">Check-out</span>
              <div class="filter-control">
                <i class="fa-regular fa-calendar-xmark"></i>
                <input type="date" id="filterCheckout" name="checkout">
              </div>
            </div>
            <div class="filter-group" style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
              <span class="filter-label">Guests</span>
              <div class="filter-control">
                <i class="fa-solid fa-user-group"></i>
                <select id="filterGuests" name="guests">
                  <option value="">Any Size</option>
                  <option value="1">1 Person</option>
                  <option value="2">2 People</option>
                  <option value="3">3+ People</option>
                  <option value="4">4+ People</option>
                  <option value="5">5+ People</option>
                </select>
              </div>
            </div>

            <!-- 2. Room Infrastructure -->
            <div class="filter-group">
              <span class="filter-label">Room Category</span>
              <div class="filter-control">
                <i class="fa-solid fa-bed"></i>
                <select id="filterType" name="type">
                  <option value="">All Types</option>
                  <option value="room">Rooms</option>
                  <option value="suite">Suites</option>
                </select>
              </div>
            </div>
            <div class="filter-group">
              <span class="filter-label">Bed Setup</span>
              <div class="filter-control">
                <i class="fa-solid fa-moon"></i>
                <select id="filterBed" name="bed">
                  <option value="">Any Bed</option>
                  <option value="single">Single Bed</option>
                  <option value="double">Double Bed</option>
                  <option value="king">King Bed</option>
                  <option value="mixed">Mixed (Family)</option>
                </select>
              </div>
            </div>
            <div class="filter-group" style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
              <span class="filter-label">Floor</span>
              <div class="filter-control">
                <i class="fa-solid fa-building"></i>
                <select id="filterFloor" name="floor">
                  <option value="">All Floors</option>
                  <option value="1">1st Floor</option>
                  <option value="2">2nd Floor</option>
                  <option value="3">3rd Floor</option>
                  <option value="4">4th Floor</option>
                </select>
              </div>
            </div>

            <!-- 3. Atmosphere & Purpose -->
            <div class="filter-group">
              <span class="filter-label">Looking For</span>
              <div class="filter-control">
                <i class="fa-solid fa-star"></i>
                <select id="filterTag" name="tag">
                  <option value="">Any Experience</option>
                  <option value="couples">Couples Getaway</option>
                  <option value="private">Private Elite</option>
                  <option value="luxury">Luxury Standard</option>
                </select>
              </div>
            </div>
            <div class="filter-group">
              <span class="filter-label">Visuals</span>
              <div class="filter-control">
                <i class="fa-solid fa-eye"></i>
                <select id="filterView" name="view">
                  <option value="">Any View</option>
                  <option value="sea">Sea View</option>
                  <option value="city">City View</option>
                </select>
              </div>
            </div>
            <div class="filter-group" style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
              <span class="filter-label">Stay Persona</span>
              <div class="filter-control">
                <i class="fa-solid fa-layer-group"></i>
                <select id="filterStayType" name="stayType">
                  <option value="">All Scenarios</option>
                  <option value="flex">Flexible Trip</option>
                  <option value="business">Business Focus</option>
                  <option value="family">Family Oriented</option>
                </select>
              </div>
            </div>

            <!-- 4. Budget & Tuning -->
            <div class="filter-group">
              <span class="filter-label">Price / Night (SAR)</span>
              <div class="filter-control">
                <i class="fa-solid fa-money-bill-wave"></i>
                <div class="range-inline">
                  <input type="number" id="filterPriceMin" name="priceMin" placeholder="Min" min="0">
                  <span>-</span>
                  <input type="number" id="filterPriceMax" name="priceMax" placeholder="Max" min="0">
                </div>
              </div>
            </div>
            <div class="filter-group">
              <span class="filter-label">Sort Listing</span>
              <div class="filter-control">
                <i class="fa-solid fa-arrow-up-wide-short"></i>
                <select id="filterSort" name="sort">
                  <option value="recommended">Best Match / Recommended</option>
                  <option value="priceLow">Value: Low to High</option>
                  <option value="priceHigh">Premium: High to Low</option>
                </select>
              </div>
            </div>

            <div class="sidebar-footer">
              <button type="button" class="btn btn-ghost" id="resetFilters">
                <i class="fa-solid fa-rotate-left"></i> Clear Filters
              </button>
            </div>
          </form>
        </aside>

        <!-- ── Room Results ─────────────────────────────────── -->
        <section>
          <div class="results-header">
            <div class="results-count" id="resultsInfo"></div>
            <a href="index.html" class="btn btn-ghost">
              <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
          </div>
          <div class="grid" id="roomsGrid"></div>
        </section>

      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footbottom">
        <div>&copy; 2026 QuickStay Hotel. All rights reserved.</div>
      </div>
    </div>
  </footer>
</main>

  <script src="../../js/shared/storage.js" defer></script>
  <script src="../../js/shared/api.js" defer></script>
  <script src="../../js/shared/dom.js" defer></script>
  <script src="../../js/shared/utils/dates.js" defer></script>
  <script src="../../js/shared/ui/header.js" defer></script>
  <script src="../../js/shared/ui/user_nav.js" defer></script>
  <script src="../../js/user/user_rooms.js" defer></script>
</body>
</html>
